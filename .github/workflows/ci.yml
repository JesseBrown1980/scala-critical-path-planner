name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: coursier/cache-action@v6.4
      - uses: VirtusLab/scala-cli-setup@v1.0
        with:
          power: true
      - name: Run test suite
        run: scala-cli test .
      - name: Run Scala demo
        run: scala-cli run . --main-class com.jbrowndevelopment.criticalpath.runPlanner -- --demo
      - name: Run Java interop demo
        run: scala-cli run . --main-class com.jbrowndevelopment.criticalpath.JavaInteropDemo
